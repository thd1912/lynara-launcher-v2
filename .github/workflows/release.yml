name: 'Release Lynara Launcher'

# Déclenchement : quand on push un tag de version (v1.0.0, v1.0.1, etc.)
on:
  push:
    tags:
      - 'v*.*.*'
  # Permet aussi de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour créer une release et uploader des assets
permissions:
  contents: write

jobs:
  publish-tauri:
    runs-on: windows-latest

    steps:
      # 1. Récupère le code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Node.js + cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installe pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 4. Cache du store pnpm pour accélérer les builds suivants
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 5. Installe la toolchain Rust stable
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 6. Cache des dépendances Rust (énorme gain de temps)
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 7. Installe les dépendances frontend
      - name: Install frontend dependencies
        run: pnpm install

      # 8. Extrait le numéro de version depuis le tag (ex: v1.0.1 → 1.0.1)
      - name: Get tag version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=manual-$(date +%s)" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          fi

      # 9. Build et création de la release Tauri
      # tauri-action s'occupe de :
      #   - Build du frontend (pnpm build)
      #   - Build du binaire Rust
      #   - Génération des bundles .msi et .exe
      #   - Signature avec la clé privée
      #   - Création de la release GitHub avec les assets
      #   - Upload du latest.json pour l'auto-updater
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Lynara Launcher v__VERSION__'
          releaseBody: |
            ## 🎉 Nouvelle version du Lynara Launcher !

            ### 📦 Téléchargement

            Choisis ton installeur préféré :
            - **`.exe` (recommandé)** : installeur léger et rapide
            - **`.msi`** : installeur Windows officiel

            ### 🔄 Mise à jour automatique

            Si tu utilises déjà le launcher, l'update se fera automatiquement au prochain démarrage.

            ### 💬 Support

            Discord : https://discord.gg/gF9rgQkf43
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
